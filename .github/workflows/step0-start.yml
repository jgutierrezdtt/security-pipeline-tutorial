name: "Step 0: Empezar tutorial"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start:
    name: Iniciar tutorial
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Actualizar README al Paso 1
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step1.md',
              'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md'
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              message: '📖 Paso 1 desbloqueado: Añade el workflow de Semgrep',
              content: encoded,
              sha: file.sha,
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            core.notice('✅ Tutorial iniciado — el README ahora muestra el Paso 1');
