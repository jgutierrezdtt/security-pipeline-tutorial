name: "Step 2: Verificar corrección de vulnerabilidades"

on:
  push:
    branches: [main]
    paths:
      - 'src/app.py'

permissions:
  contents: write

jobs:
  verify-fix:
    name: Verificar y avanzar al Paso 3
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que estamos en el Paso 2
        id: check-step
        run: |
          if grep -q "Paso 2 de 3" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "✅ Estamos en el Paso 2"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No estamos en el Paso 2 — ignorando"
          fi

      - name: Verificar que command injection fue corregido
        if: steps.check-step.outputs.active == 'true'
        run: |
          if grep -qF 'os.system(' src/app.py; then
            echo "::error file=src/app.py::Todavía existe os.system() en el código. Reemplázalo con subprocess.run([\"ping\", \"-c\", \"1\", host], check=True)"
            exit 1
          fi
          echo "✅ os.system() eliminado"

      - name: Verificar que SQL injection fue corregido
        if: steps.check-step.outputs.active == 'true'
        run: |
          if grep -qF '+ username' src/app.py; then
            echo "::error file=src/app.py::La consulta SQL sigue usando concatenación con username. Usa: cursor.execute(\"SELECT * FROM users WHERE name = ?\", (username,))"
            exit 1
          fi
          echo "✅ Consulta SQL parametrizada"

      - name: Actualizar README al Paso 3
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step3.md',
              'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md'
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              message: '📖 Paso 3 desbloqueado: Configura Dependabot',
              content: encoded,
              sha: file.sha,
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            core.notice('✅ Vulnerabilidades corregidas — el README ahora muestra el Paso 3');
